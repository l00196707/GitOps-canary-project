apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 1h

  chart:
    spec:
      chart: flagger
      version: "1.40.0"
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flux-system

  values:
    meshProvider: nginx
